services:
  postgres:
    image: postgres:15
    container_name: soa_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=evolution
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - soa_network

  redis:
    image: redis:7
    container_name: soa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - soa_network

  ngrok:
    image: ngrok/ngrok:latest
    container_name: soa_ngrok
    restart: unless-stopped
    command: http soa_n8n:5678 --authtoken ${NGROK_AUTH_TOKEN} --domain=bivariate-unmonotonously-sadie.ngrok-free.dev
    ports:
      - "4040:4040"
    depends_on:
      - n8n
    networks:
      - soa_network

  evolution_api:
    image: atendai/evolution-api:latest
    container_name: soa_evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    environment:
      - REDIS_URI=redis://soa_redis:6379
      - SERVER_URL=${NGROK_URL}
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${WA_API_KEY}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${POSTGRES_PASSWORD}@soa_postgres:5432/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - CONFIG_SESSION_PHONE_VERSION=${CONFIG_SESSION_PHONE_VERSION}
      - WEB_VERSION=${WEB_VERSION}
      - SESSION_CLIENT=chrome
      - SESSION_NAME=SOA
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://soa_redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=true
      - WEBHOOK_GLOBAL_URL=${NGROK_URL}/webhook/soa
      - LOG_LEVEL=ERROR
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - soa_network

  n8n:
    image: n8nio/n8n:2.14.2
    container_name: soa_n8n
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${NGROK_URL}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
      - EXECUTIONS_DATA_PRUNE=false
      - GENERIC_TIMEZONE=America/Bogota
      - N8N_LOG_LEVEL=info
      - N8N_PROXY_HOPS=1
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_API_KEY_2=${OPENROUTER_API_KEY_2}
      - OPENROUTER_URL=${OPENROUTER_URL}
      - MODEL_IA1=${MODEL_IA1}
      - MODEL_IA2=${MODEL_IA2}
      - MODEL_IA3=${MODEL_IA3}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WHISPER_MODEL=${WHISPER_MODEL}
      - WA_API_KEY=${WA_API_KEY}
      - WA_API_URL=${WA_API_URL}
      - WA_INSTANCE=${WA_INSTANCE}
      - WA_NUMERO_AUTORIZADO=${WA_NUMERO_AUTORIZADO}
      - N8N_ENABLE_EXECUTIONS_PROCESS=main
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - N8N_ENABLE_COMMAND_EXECUTION=true
    volumes:
      - n8n_data:/home/node/.n8n
      - ~/soa:/home/node/soa
    networks:
      - soa_network

volumes:
  n8n_data:
  evolution_data:
  postgres_data:

networks:
  soa_network:
    driver: bridge